<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HARUM - Himpunan Alumni Roudlotul Ulum</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <!-- Loading Screen -->
        <div id="loading-screen">
            <div class="loader-container">
                <img src="assets/logo.jpg" alt="HARUM" class="loading-logo">
                <div class="loader"></div>
                <p>Memuat Aplikasi...</p>
            </div>
        </div>

        <!-- Main Content -->
        <div id="main-content" style="display:none;">
            <!-- Header -->
            <header id="app-header">
                <button id="menu-toggle" class="menu-btn">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="header-logo" onclick="navigateTo('home')">
                    <img src="assets/logo.jpg" alt="HARUM">
                    <span>HARUM</span>
                </div>
                <div id="clock" class="header-clock">
                    <i class="fas fa-clock"></i>
                    <span id="time-display">00:00:00</span>
                </div>
            </header>

            <!-- Sidebar -->
            <div id="sidebar" class="sidebar">
                <div class="sidebar-header">
                    <img src="assets/logo.jpg" alt="HARUM" class="sidebar-logo">
                    <h2>HARUM</h2>
                    <p>Himpunan Alumni Roudlotul Ulum</p>
                    <div id="user-info-sidebar" class="user-info"></div>
                </div>
                <nav class="sidebar-nav">
                    <a href="#" onclick="navigateTo('home')" data-page="home">
                        <i class="fas fa-home"></i> Beranda
                    </a>
                    <a href="#" onclick="navigateTo('pengumuman')" data-page="pengumuman">
                        <i class="fas fa-bullhorn"></i> Pengumuman
                    </a>
                    <a href="#" onclick="navigateTo('artikel')" data-page="artikel">
                        <i class="fas fa-book"></i> Buku Artikel/Blog
                    </a>
                    <a href="#" onclick="navigateTo('jumat-pahing')" data-page="jumat-pahing">
                        <i class="fas fa-calendar-check"></i> Jumat Pahing
                    </a>
                    <a href="#" onclick="navigateTo('kas')" data-page="kas">
                        <i class="fas fa-money-bill-wave"></i> Uang Kas
                    </a>
                    <a href="#" onclick="navigateTo('kalender')" data-page="kalender">
                        <i class="fas fa-calendar-alt"></i> Kalender
                    </a>
                    <a href="#" onclick="navigateTo('haul')" data-page="haul">
                        <i class="fas fa-mosque"></i> Haul Akbar
                    </a>
                    <a href="#" onclick="navigateTo('donasi-haul')" data-page="donasi-haul">
                        <i class="fas fa-hand-holding-heart"></i> Donasi Haul
                    </a>
                    <a href="#" onclick="navigateTo('rombongan')" data-page="rombongan">
                        <i class="fas fa-bus"></i> Rombongan Malang
                    </a>
                    <a href="#" onclick="navigateTo('kedatangan-nyai')" data-page="kedatangan-nyai">
                        <i class="fas fa-user-tie"></i> Kedatangan Nyai
                    </a>
                    <a href="#" onclick="navigateTo('profil')" data-page="profil">
                        <i class="fas fa-user-circle"></i> Profil Saya
                    </a>
                    <div id="admin-menu" style="display:none;">
                        <hr>
                        <a href="#" onclick="navigateTo('admin-panel')" data-page="admin-panel">
                            <i class="fas fa-cog"></i> Admin Panel
                        </a>
                    </div>
                    <hr>
                    <a href="#" onclick="logoutUser()" class="logout-link">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </a>
                </nav>
            </div>

            <!-- Overlay -->
            <div id="sidebar-overlay" class="sidebar-overlay"></div>

            <!-- Page Content -->
            <main id="page-content"></main>
        </div>
    </div>

    <!-- Recaptcha Container -->
    <div id="recaptcha-container"></div>

    <!-- JavaScript -->
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
