<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HARUM - Sabilun Najah</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <img src="assets/logo.png" alt="Logo HARUM" id="logo-img">
                <h1>HARUM</h1>
            </div>
            <nav>
                <ul>
                    <li onclick="navigateTo('beranda')">Beranda</li>
                    <li onclick="navigateTo('sabilun-najah')">Sabilun Najah</li>
                    <li onclick="navigateTo('kalender')">Kalender</li>
                    <li onclick="navigateTo('iuran-rutin')">Iuran Rutin</li>
                    <li onclick="navigateTo('uang-kas')">Uang Kas</li>
                    <li onclick="navigateTo('pengumuman')">Pengumuman</li>
                    <li onclick="navigateTo('agenda-putri')">Agenda Putri Syaikhuna</li>
                    <li onclick="navigateTo('haul-akbar')">Haul Akbar</li>
                    <li onclick="navigateTo('iuran-malang')">Iuran Malang</li>
                </ul>
            </nav>
            <div class="user-info">
                <p id="user-role"></p>
                <button onclick="logout()">Logout</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header>
                <h2 id="page-title">Beranda</h2>
                <div id="admin-controls" class="admin-only"></div>
            </header>
            
            <!-- Content akan di-load oleh JS -->
            <div id="content-area"></div>
        </main>
    </div>

    <!-- Login Modal -->
    <div id="login-modal" class="modal">
        <div class="modal-content">
            <h3>Login HARUM</h3>
            <input type="tel" id="phone-input" placeholder="Masukkan Nomor HP (contoh: 08123456789)" required>
            <button onclick="login()">Login</button>
            <p class="hint">Demo: Admin = 0811111111 | User = 0822222222</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
