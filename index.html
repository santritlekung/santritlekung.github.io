<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi HARUM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header / Navigasi Atas -->
    <header class="main-header">
        <div class="logo-area">
            <span class="app-title">HARUM</span>
        </div>
        <div id="auth-status" class="auth-container">
            <span id="user-role" class="badge badge-tamu">Tamu</span>
            <button id="btn-login" class="btn-login" onclick="handleLoginWindow()">➔ Login</button>
        </div>
    </header>

    <!-- Kontainer Utama -->
    <main class="container">
        
        <!-- Efek Memuat Halaman (Akan hilang otomatis jika Firebase tersambung) -->
        <div id="loading-screen" class="loading-box">
            <div class="spinner"></div>
            <p>Memuat data dari peladen cloud...</p>
        </div>

        <!-- Dashboard Utama (Awalnya disembunyikan, muncul setelah data beres) -->
        <div id="main-content" class="content-hidden">
            
            <!-- Ringkasan Kas -->
            <section class="card-summary">
                <h2>Ringkasan Kas Utama</h2>
                <div class="total-dana" id="display-total-kas">Rp 0</div>
            </section>

            <!-- Menu Fitur Aplikasi -->
            <section class="menu-grid">
                <div class="menu-item">
                    <h3>Kas Sosial</h3>
                    <p id="display-total-sosial">Rp 0</p>
                </div>
                <div class="menu-item">
                    <h3>Sabilun</h3>
                    <p id="display-total-sabilun">Rp 0</p>
                </div>
                <div class="menu-item">
                    <h3>Jumat Pahing</h3>
                    <p id="display-total-jumat">Rp 0</p>
                </div>
            </section>

            <!-- Agenda Kegiatan -->
            <section class="card-agenda">
                <h2>Agenda Kegiatan</h2>
                <ul id="list-agenda" class="agenda-list">
                    <li class="empty-list">Belum ada agenda terdekat.</li>
                </ul>
            </section>

        </div>
    </main>

    <!-- Script JavaScript Utama -->
    <script src="app.js"></script>
</body>
</html>
