<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HARUM — Aplikasi Santri</title>
    <!-- Font & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <!-- Style -->
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>

    <!-- ===== SHELL ===== -->
    <div id="app">

        <!-- SIDEBAR / NAV -->
        <aside id="sidebar">
            <div class="sidebar-brand">
                <img src="assets/logo.jpg" alt="Logo HARUM" class="brand-logo" />
                <span class="brand-name">HARUM</span>
            </div>
            <nav class="sidebar-nav" id="mainNav">
                <!-- dinamis dari JS -->
            </nav>
            <div class="sidebar-user">
                <div class="user-avatar" id="userAvatar">U</div>
                <div class="user-info">
                    <span class="user-name" id="userName">User</span>
                    <span class="user-role" id="userRole">role</span>
                </div>
                <button class="btn-logout" id="btnLogout"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main id="mainContent">
            <header class="main-header">
                <button class="btn-toggle-sidebar" id="btnToggleSidebar"><i class="fas fa-bars"></i></button>
                <h1 id="pageTitle">Dashboard</h1>
                <div class="header-actions">
                    <span class="greeting" id="greetingText">Selamat datang!</span>
                </div>
            </header>
            <section class="page-content" id="pageContent">
                <!-- konten dinamis dari JS -->
            </section>
        </main>

        <!-- MODAL OVERLAY -->
        <div class="modal-overlay" id="modalOverlay">
            <div class="modal-box" id="modalBox">
                <div class="modal-header">
                    <h3 id="modalTitle">Modal</h3>
                    <button class="modal-close" id="modalClose">&times;</button>
                </div>
                <div class="modal-body" id="modalBody">
                    <!-- konten modal -->
                </div>
                <div class="modal-footer" id="modalFooter">
                    <!-- tombol aksi -->
                </div>
            </div>
        </div>

        <!-- LOGIN OVERLAY -->
        <div class="login-overlay" id="loginOverlay">
            <div class="login-card">
                <div class="login-brand">
                    <img src="assets/logo.jpg" alt="Logo HARUM" class="login-logo" />
                    <h2>HARUM</h2>
                    <p>Hidayah & Rahmat untuk Umat</p>
                </div>
                <form id="loginForm">
                    <div class="form-group">
                        <label><i class="fas fa-phone"></i> Nomor HP</label>
                        <input type="tel" id="loginPhone" placeholder="08123456789" value="08123456789" />
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Masuk</button>
                    <p class="login-hint">Gunakan <strong>08123456789</strong> (Admin) atau <strong>08123456788</strong> (User)</p>
                </form>
            </div>
        </div>

    </div>

    <!-- ===== SCRIPTS ===== -->
    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/components/sabilun.js"></script>
    <script src="js/components/kalender.js"></script>
    <script src="js/components/iuran.js"></script>
    <script src="js/components/kas.js"></script>
    <script src="js/components/quote.js"></script>
    <script src="js/components/pengumuman.js"></script>
    <script src="js/components/agenda-putri.js"></script>
    <script src="js/components/agenda-haul.js"></script>
    <script src="js/components/iuran-malang.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
