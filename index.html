<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HARUM - Alumni Roudlotul Ulum</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-arab { font-family: 'Amiri', serif; direction: rtl; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased h-screen flex flex-col overflow-hidden">

    <div id="layarLogin" class="fixed inset-0 bg-emerald-900 z-50 flex flex-col justify-center items-center p-6 text-white">
        <div class="w-full max-w-sm text-center space-y-6">
            <div class="space-y-2">
                <img src="logo.jpg" alt="Logo HARUM" class="w-20 h-20 rounded-full mx-auto bg-white object-cover border-2 border-emerald-500" onerror="this.src='https://via.placeholder.com/150'">
                <h1 class="text-2xl font-bold tracking-wider">Aplikasi HARUM</h1>
                <p class="text-xs text-emerald-200">Korwil Demak & Sekitarnya</p>
            </div>
            
            <div id="boxInputHP" class="bg-white text-gray-800 p-5 rounded-2xl shadow-xl space-y-4 text-left">
                <div>
                    <label class="text-xs font-bold text-gray-400 block mb-1">NOMOR WHATSAPP</label>
                    <div class="flex items-center border border-gray-200 rounded-lg overflow-hidden">
                        <span class="bg-gray-100 px-3 py-2.5 text-xs font-semibold text-gray-500">+62</span>
                        <input type="tel" id="inputNoHP" value="081330386625" class="w-full p-2.5 text-xs focus:outline-none">
                    </div>
                </div>
                <button onclick="prosesLoginDemo()" class="w-full bg-emerald-700 text-white p-3 rounded-xl text-xs font-bold hover:bg-emerald-800 transition">
                    Masuk (Mode Uji Coba) <i class="fas fa-sign-in-alt ml-1"></i>
                </button>
            </div>
        </div>
    </div>

    <header class="bg-emerald-700 text-white h-16 px-4 flex items-center justify-between shadow-md z-30 shrink-0">
        <div class="flex items-center space-x-3">
            <button id="btnHamburger" class="text-2xl p-1 hover:text-emerald-200 transition">
                <i class="fas fa-bars"></i>
            </button>
            <div class="flex items-center space-x-2 cursor-pointer" onclick="bukaHalaman('dashboard')">
                <img src="logo.jpg" class="w-8 h-8 rounded-full bg-white object-cover" onerror="this.src='https://via.placeholder.com/150'">
                <span class="font-bold text-lg tracking-wider">HARUM</span>
            </div>
        </div>
        <div id="jamDigital" class="font-mono text-sm bg-emerald-800 px-3 py-1 rounded">00:00:00</div>
    </header>

    <div class="flex flex-1 relative overflow-hidden">
        <div id="sidebarOverlay" class="fixed inset-0 bg-black/50 z-40 hidden transition-opacity duration-300"></div>
        <aside id="sidebar" class="absolute inset-y-0 left-0 w-72 bg-white shadow-2xl z-50 transform -translate-x-full transition-transform duration-300 flex flex-col justify-between">
            <div class="overflow-y-auto flex-1">
                <div class="p-5 bg-emerald-800 text-white">
                    <h3 class="font-bold text-lg">Menu Navigasi</h3>
                    <p class="text-xs text-emerald-200" id="userPhoneDisplay">User: -</p>
                </div>
                <nav class="p-2 space-y-1" id="menuKonten"></nav>
            </div>
            <div class="p-4 border-t border-gray-100 bg-gray-50">
                <button onclick="logoutAplikasi()" class="w-full flex items-center space-x-3 text-red-600 p-2 rounded-lg hover:bg-red-50 font-medium transition">
                    <i class="fas fa-sign-out-alt w-6 text-center"></i>
                    <span>Keluar (Logout)</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-4" id="kontenHalaman">
            <p class="text-center text-xs text-gray-400 mt-10">Memuat komponen halaman...</p>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
