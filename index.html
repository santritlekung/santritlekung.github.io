<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HARUM</title>
    <!-- Ditambahkan ?v=2 agar browser terpaksa memuat CSS terbaru -->
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>

    <!-- Header dengan pengaturan ukuran langsung (Inline Style) agar logo pasti mengecil -->
    <header class="main-header" style="background: #0b5e32; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; color: white;">
        <div class="logo-side" style="display: flex; align-items: center; gap: 10px;">
            <img src="logo.jpg" class="brand-logo" style="height: 40px; width: 40px; border-radius: 5px; object-fit: cover; display: inline-block; vertical-align: middle;">
            <span class="app-title" style="font-weight: bold; font-size: 1.2rem;">HARUM</span>
        </div>
        <button id="btn-login" class="btn-login" onclick="handleLoginWindow()">Login</button>
    </header>

    <main class="container">
        <div id="main-content">
            <section class="card-summary">
                <h2>Ringkasan Kas Utama</h2>
                <div class="total-dana" id="display-total-kas">Rp 0</div>
            </section>

            <section class="menu-grid">
                <div class="menu-item"><h3>KAS SOSIAL</h3><p id="display-total-sosial">Rp 0</p></div>
                <div class="menu-item"><h3>SABILUN</h3><p id="display-total-sabilun">Rp 0</p></div>
                <div class="menu-item"><h3>JUMAT</h3><p id="display-total-jumat">Rp 0</p></div>
            </section>

            <section class="card-agenda">
                <h2>Agenda Kegiatan</h2>
                <ul id="list-agenda" class="agenda-list"><li class="empty-list">Belum ada agenda.</li></ul>
            </section>
        </div>
    </main>
    <script src="app.js"></script>
</body>
</html>
